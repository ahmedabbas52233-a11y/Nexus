name: CI Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Lint
        run: npx eslint src
      - name: Build
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Syntax check all source files
        run: |
          for f in $(find src -name "*.js"); do
            node -c "$f" || exit 1
          done
      - name: Boot server smoke test
        run: |
          node src/server.js &
          SERVER_PID=$!
          sleep 2
          curl -sf http://localhost:5000/api/health || exit 1
          kill $SERVER_PID
        env:
          JWT_SECRET: ci-only-placeholder-secret
          NODE_ENV: test
